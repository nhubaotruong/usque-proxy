name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Go 1.24.2
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-36" "platforms;android-31" "build-tools;36.0.0" "ndk;28.0.13004108"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build usque AAR
        run: bash build-usque.sh

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks

      - name: Create keystore.properties
        run: |
          printf '%s\n' \
            "storeFile=keystore.jks" \
            "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" \
            "keyAlias=${{ secrets.KEY_ALIAS }}" \
            "keyPassword=${{ secrets.KEY_PASSWORD }}" \
            > keystore.properties

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: mv app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/UsqueProxy-${GITHUB_REF_NAME}-arm64-v8a.apk

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/UsqueProxy-*.apk
