name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Go 1.25.5
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.5'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install SDK packages
        run: sdkmanager "platforms;android-36" "platforms;android-31" "build-tools;36.0.0" "ndk;29.0.14206865"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20260410095206-2cfb76559b7b
          go install golang.org/x/mobile/cmd/gobind@v0.0.0-20260410095206-2cfb76559b7b

      - name: Build usque AAR
        run: bash build-usque.sh

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks

      - name: Create keystore.properties
        run: |
          printf '%s\n' \
            "storeFile=keystore.jks" \
            "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" \
            "keyAlias=${{ secrets.KEY_ALIAS }}" \
            "keyPassword=${{ secrets.KEY_PASSWORD }}" \
            > keystore.properties

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: mv app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/UsqueProxy-${GITHUB_REF_NAME}-arm64-v8a.apk

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: app/build/outputs/apk/release/UsqueProxy-*.apk
